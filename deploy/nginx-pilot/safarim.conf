# Safarim.uz — PILOT nginx (HTTP only, IP orqali, domensiz).
# Real domen+HTTPS uchun deploy/nginx/conf.d/safarim.conf ishlatiladi.

upstream safarim_api      { server api:8000; }
upstream safarim_frontend { server frontend:3000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 15m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Backend API (+ WebSocket chat)
    location /api/ {
        proxy_pass http://safarim_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://safarim_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
