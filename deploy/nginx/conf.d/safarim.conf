# Safarim.uz — Nginx reverse proxy.
# ⚠️ "safarim.uz" ni o'z domeningizga almashtiring (2 ta server blokda).

upstream safarim_api {
    server api:8000;
}
upstream safarim_frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS (va ACME challenge) ─────────────────────────────────────────
server {
    listen 80;
    server_name safarim.uz www.safarim.uz;

    # Let's Encrypt tekshiruvi
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name safarim.uz www.safarim.uz;

    ssl_certificate     /etc/letsencrypt/live/safarim.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safarim.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Xavfsizlik sarlavhalari
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Fayl yuklash (guvohnoma rasmlari) uchun limit
    client_max_body_size 15m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Backend API (+ WebSocket chat) ──
    location /api/ {
        proxy_pass http://safarim_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # ── Frontend (Next.js) ──
    location / {
        proxy_pass http://safarim_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
