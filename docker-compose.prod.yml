# Safarim.uz — production stack.
# Ishga tushirish:  docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Eslatma: db/redis/minio portlari TASHQARIGA ochilmaydi — faqat ichki tarmoq.
# Tashqi kirish faqat nginx (80/443) orqali.

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # Pilot: media (rasm/avatar) brauzerdan ko'rinishi uchun S3 porti (9000) ochiq.
    # Obyektlar presigned URL bilan himoyalangan. Console (9001) ochiq EMAS.
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: ./safarim-backend
      dockerfile: Dockerfile.prod
    image: safarim-api:latest
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: safarim-api:latest
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,notifications
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - api
      - redis
      - db

  celery-beat:
    image: safarim-api:latest
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis

  frontend:
    build:
      context: ./safarim-frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    image: safarim-frontend:latest
    restart: always
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend

  # HTTPS sertifikat (Let's Encrypt). Birinchi marta DEPLOY.md ga qarang.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Kunlik DB backup (retention bilan)
  backup:
    image: postgres:16-alpine
    restart: always
    env_file: .env.production
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./safarim-backend/scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backup_data:/backups
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sh /usr/local/bin/backup.sh; sleep 24h & wait $${!}; done;'"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
